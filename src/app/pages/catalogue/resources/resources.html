<div class="d-flex align-items-start justify-content-between gap-3">
  <div>
    <h2 class="h4 mb-1">Resources</h2>
    <div class="text-muted">Manage bookable resources.</div>
  </div>

  <button
    class="btn btn-outline-secondary icon-btn"
    type="button"
    (click)="refresh()"
    [disabled]="loading()"
    title="Refresh"
    aria-label="Refresh"
  >
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</div>

<hr />

<!-- Create -->
<div class="card border-0 bg-light-subtle mb-3">
  <div class="card-body">
    <div class="row g-2 align-items-end">
      <div class="col-12 col-lg-5">
        <label class="form-label">Name</label>
        <input
          class="form-control"
          [(ngModel)]="newName"
          [disabled]="loading()"
          placeholder="e.g. Meeting Room A"
        />
      </div>

      <div class="col-12 col-lg-5">
        <label class="form-label">Description</label>
        <input
          class="form-control"
          [(ngModel)]="newDescription"
          [disabled]="loading()"
          placeholder="Optional"
        />
      </div>

      <div class="col-12 col-lg-2">
        <button
          class="btn btn-app w-100"
          type="button"
          (click)="create()"
          [disabled]="!canCreate()"
        >
          <i class="bi bi-plus-lg me-2"></i>
          Create
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Table -->
<div class="tableScroll">
<div class="table-responsive">
  <table class="table align-middle table-hover">
    <thead>
    <tr>
      <th style="width: 35%">Name</th>
      <th>Description</th>
      <th class="text-end" style="width: 160px">Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr *ngFor="let r of resources()">
      <td>
        <ng-container *ngIf="!isEditing(r); else editNameTpl">
          <span class="fw-semibold">{{ r.name }}</span>
        </ng-container>

        <ng-template #editNameTpl>
          <input class="form-control form-control-sm" [(ngModel)]="editName" [disabled]="loading()" />
        </ng-template>
      </td>

      <td>
        <ng-container *ngIf="!isEditing(r); else editDescTpl">
          <span class="text-muted">{{ r.description || '—' }}</span>
        </ng-container>

        <ng-template #editDescTpl>
          <input
            class="form-control form-control-sm"
            [(ngModel)]="editDescription"
            [disabled]="loading()"
            placeholder="Optional"
          />
        </ng-template>
      </td>

      <td class="text-end">
        <ng-container *ngIf="!isEditing(r); else editActionsTpl">
          <button
            class="btn btn-outline-secondary icon-btn me-2"
            type="button"
            (click)="startEdit(r)"
            [disabled]="loading()"
            title="Edit"
            aria-label="Edit"
          >
            <i class="bi bi-pencil"></i>
          </button>

          <button
            class="btn btn-outline-danger icon-btn"
            type="button"
            (click)="openDelete(r)"
            [disabled]="loading()"
            title="Delete"
            aria-label="Delete"
          >
            <i class="bi bi-trash"></i>
          </button>
        </ng-container>

        <ng-template #editActionsTpl>
          <button
            class="btn btn-app icon-btn me-2"
            type="button"
            (click)="saveEdit()"
            [disabled]="!canSaveEdit()"
            title="Save"
            aria-label="Save"
          >
            <i class="bi bi-check-lg"></i>
          </button>

          <button
            class="btn btn-outline-secondary icon-btn"
            type="button"
            (click)="cancelEdit()"
            [disabled]="loading()"
            title="Cancel"
            aria-label="Cancel"
          >
            <i class="bi bi-x-lg"></i>
          </button>
        </ng-template>
      </td>
    </tr>

    <tr *ngIf="!loading() && resources().length === 0">
      <td colspan="3" class="text-center text-muted py-4">No resources yet.</td>
    </tr>
    </tbody>
  </table>
</div>
</div>
<!-- Delete modal (if present in TS) -->
<ng-container *ngIf="deleteOpen()">
  <div class="modal-backdrop fade show"></div>

  <div class="modal d-block" tabindex="-1" role="dialog" (click)="closeDelete()">
    <div class="modal-dialog modal-dialog-centered" role="document" (click)="$event.stopPropagation()">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirm delete</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="closeDelete()"></button>
        </div>

        <div class="modal-body">
          <p class="mb-0">Delete <b>{{ deleteTarget()?.name }}</b>?</p>
          <p class="text-muted small mb-0 mt-2">This action cannot be undone.</p>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" (click)="closeDelete()" [disabled]="loading()">
            Cancel
          </button>
          <button type="button" class="btn btn-danger" (click)="confirmDelete()" [disabled]="loading()">
            Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</ng-container>
