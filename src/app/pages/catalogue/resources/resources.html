<div class="d-flex align-items-start justify-content-between gap-3">
  <div>
    <h2 class="h4 mb-1">Resources</h2>
    <div class="text-muted">CRUD delle risorse prenotabili.</div>
  </div>

  <button
    class="btn btn-outline-secondary btn-sm px-3 d-inline-flex align-items-center gap-2"
    type="button"
    (click)="refresh()"
    [disabled]="loading()"
    title="Refresh"
  >
    <i class="bi bi-arrow-clockwise"></i>
    Refresh
  </button>
</div>

<hr />

<!-- Loading -->
<div *ngIf="loading()" class="alert alert-light border d-flex align-items-center gap-2" role="status">
  <div class="spinner-border spinner-border-sm" aria-hidden="true"></div>
  <div>Caricamento…</div>
</div>

<!-- Create form -->
<div class="card border-0 bg-light-subtle mb-3">
  <div class="card-body">
    <div class="d-flex flex-column flex-lg-row gap-2 align-items-lg-end">
      <div class="flex-fill">
        <label class="form-label">Name</label>
        <input
          class="form-control"
          [(ngModel)]="newName"
          [disabled]="loading()"
          placeholder="Es: Sala Riunioni A"
        />
        <div class="form-text">Min 2 caratteri</div>
      </div>

      <div class="flex-fill">
        <label class="form-label">Description</label>
        <input
          class="form-control"
          [(ngModel)]="newDescription"
          [disabled]="loading()"
          placeholder="Opzionale"
        />
      </div>

      <div class="createBtn">
        <button
          class="btn btn-app w-100 d-inline-flex align-items-center justify-content-center gap-2"
          type="button"
          (click)="create()"
          [disabled]="!canCreate()"
          title="Create"
        >
          <i class="bi bi-plus-lg"></i>
          Create
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Table -->
<div class="table-responsive">
  <table class="table align-middle table-hover">
    <thead>
    <tr>
      <th style="width: 30%">Name</th>
      <th>Description</th>
      <th class="text-end" style="width: 220px">Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr *ngFor="let r of resources()">
      <!-- NAME -->
      <td>
        <ng-container *ngIf="!isEditing(r); else editNameTpl">
          <span class="fw-semibold">{{ r.name }}</span>
        </ng-container>

        <ng-template #editNameTpl>
          <input class="form-control form-control-sm" [(ngModel)]="editName" [disabled]="loading()" />
          <div class="form-text">Min 2 caratteri</div>
        </ng-template>
      </td>

      <!-- DESC -->
      <td>
        <ng-container *ngIf="!isEditing(r); else editDescTpl">
          <span class="text-muted">{{ r.description || '—' }}</span>
        </ng-container>

        <ng-template #editDescTpl>
          <input
            class="form-control form-control-sm"
            [(ngModel)]="editDescription"
            [disabled]="loading()"
            placeholder="Opzionale"
          />
        </ng-template>
      </td>

      <!-- ACTIONS -->
      <td class="text-end">
        <ng-container *ngIf="!isEditing(r); else editActionsTpl">
          <button
            class="btn btn-outline-secondary icon-btn me-2"
            type="button"
            (click)="startEdit(r)"
            [disabled]="loading()"
            title="Edit"
          >
            <i class="bi bi-pencil"></i>
          </button>

          <button
            class="btn btn-outline-danger icon-btn"
            type="button"
            (click)="openDelete(r)"
            [disabled]="loading()"
            title="Delete"
          >
            <i class="bi bi-trash"></i>
          </button>
        </ng-container>

        <ng-template #editActionsTpl>
          <button
            class="btn btn-app icon-btn me-2"
            type="button"
            (click)="saveEdit()"
            [disabled]="!canSaveEdit()"
            title="Save"
          >
            <i class="bi bi-check-lg"></i>
          </button>

          <button
            class="btn btn-outline-secondary icon-btn"
            type="button"
            (click)="cancelEdit()"
            [disabled]="loading()"
            title="Cancel"
          >
            <i class="bi bi-x-lg"></i>
          </button>
        </ng-template>
      </td>
    </tr>

    <tr *ngIf="!loading() && resources().length === 0">
      <td colspan="3" class="text-center text-muted py-4">Nessuna risorsa.</td>
    </tr>
    </tbody>
  </table>
</div>

<!-- DELETE MODAL (se lo stai usando già nel TS) -->
<ng-container *ngIf="deleteOpen()">
  <div class="modal-backdrop fade show"></div>

  <div class="modal d-block" tabindex="-1" role="dialog" (click)="closeDelete()">
    <div class="modal-dialog modal-dialog-centered" role="document" (click)="$event.stopPropagation()">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Conferma eliminazione</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="closeDelete()"></button>
        </div>

        <div class="modal-body">
          <p class="mb-0">
            Vuoi eliminare la risorsa <b>{{ deleteTarget()?.name }}</b>?
          </p>
          <p class="text-muted small mb-0 mt-2">Questa azione non è reversibile.</p>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" (click)="closeDelete()" [disabled]="loading()">
            Annulla
          </button>
          <button type="button" class="btn btn-danger" (click)="confirmDelete()" [disabled]="loading()">
            Elimina
          </button>
        </div>
      </div>
    </div>
  </div>
</ng-container>
